<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ToDO List</title>
    <style>
.todo-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
  background-color: #f9fafb;
  padding: 10px 14px;
  border-radius: 8px;
  border: 1px solid #e5e7eb;
}
body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background-color: #f9fafb;
  color: #1f2937;
  line-height: 1.5;
  margin: 0;
  padding: 40px 20px;
  display: flex;
  justify-content: center;
}

#root > div {
  background-color: #ffffff;
  padding: 30px;
  border-radius: 12px;
  box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
  max-width: 450px;
  width: 100%;
}

h1 {
  font-size: 1.75rem;
  font-weight: 700;
  color: #111827;
  margin-top: 0;
  margin-bottom: 20px;
  border-bottom: 2px solid #f3f4f6;
  padding-bottom: 10px;
}

h3 {
  font-size: 1.1rem;
  color: #4b5563;
  margin-top: 20px;
  margin-bottom: 12px;
}

span {
  font-size: 1rem;
  color: #374151;
}

s span {
  color: #9ca3af;
}

input {
  width: 100%;
  padding: 10px 14px;
  font-size: 1rem;
  border: 1px solid #d1d5db;
  border-radius: 6px;
  background-color: #fff;
  box-sizing: border-box;
  transition: border-color 0.15s ease-in-out;
  margin-bottom: 12px;
}

.func{width:100%;padding: 12px 16px;}

table,tr{
  width:100%;
}
td{width:50%;}

input:focus {
  outline: none;
  border-color: #3b82f6;
  box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
}


    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
